<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeroSMS — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e0e;color:#e8e8e8;font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid #1f1f1f;background:#111;flex-wrap:wrap;gap:10px}
  .logo{font-family:'IBM Plex Mono',monospace;font-size:15px;color:#a3e635;font-weight:600}
  .top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .balance{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#a3e635}
  .btn{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:7px 14px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#888;cursor:pointer;transition:all .15s}
  .btn:hover{background:#1f1f1f;color:#e8e8e8}
  .btn-toggle{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;padding:8px 20px;border-radius:8px;border:none;cursor:pointer;transition:all .15s}
  .btn-toggle.on{background:#22c55e;color:#000}
  .btn-toggle.off{background:#ef4444;color:#fff}
  .btn-reset-schedule{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 12px;border-radius:6px;border:1px solid #3d2a00;background:#1c1200;color:#f59e0b;cursor:pointer}
  .btn-reset-schedule:hover{background:#2a1a00}

  .content{padding:24px}
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
  .stat{background:#161616;border:1px solid #1f1f1f;border-radius:10px;padding:16px}
  .stat-lbl{font-size:11px;color:#555;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
  .stat-val{font-size:28px;font-weight:500;font-family:'IBM Plex Mono',monospace;color:#e8e8e8}
  .stat-val.green{color:#22c55e}
  .stat-val.amber{color:#f59e0b}

  .banner{padding:10px 16px;border-radius:8px;margin-bottom:12px;font-family:'IBM Plex Mono',monospace;font-size:13px;display:flex;align-items:center;gap:8px}
  .banner.on{background:#0d2418;border:1px solid #14532d;color:#22c55e}
  .banner.off{background:#1c0a0a;border:1px solid #7f1d1d;color:#ef4444}
  .banner.auto{background:#1c1200;border:1px solid #3d2a00;color:#f59e0b}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot.on{background:#22c55e}
  .dot.off{background:#ef4444}
  .dot.auto{background:#f59e0b}

  .schedule-info{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#555;margin-bottom:20px;padding:8px 12px;background:#111;border-radius:6px;border:1px solid #1f1f1f}

  .section-title{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
  .va-list{display:flex;flex-direction:column;gap:8px}
  .va-row{background:#161616;border:1px solid #1f1f1f;border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px}
  .va-row.has-number{border-color:#f59e0b}
  .va-avatar{width:36px;height:36px;border-radius:50%;background:#1f1f1f;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#555;flex-shrink:0}
  .va-info{flex:1}
  .va-id{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#888}
  .va-number{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#f59e0b;margin-top:2px}
  .va-time{font-size:11px;color:#444;margin-top:2px}
  .va-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600}
  .va-badge.active{background:#1c1200;color:#f59e0b;border:1px solid #3d2a00}
  .va-badge.idle{background:#0e0e0e;color:#444;border:1px solid #1f1f1f}
  .btn-kick{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid #7f1d1d;background:transparent;color:#ef4444;cursor:pointer}
  .btn-kick:hover{background:#1c0a0a}
  .empty-state{text-align:center;padding:3rem;color:#333;font-family:'IBM Plex Mono',monospace;font-size:13px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">// Admin — HeroSMS VA</div>
  <div class="top-right">
    <div class="balance">Solde : <span id="lbl-balance">—</span></div>
    <button class="btn" onclick="refreshBalance()">Solde ↻</button>
    <button class="btn-reset-schedule" id="btn-auto" onclick="resetSchedule()" style="display:none">↺ Mode auto</button>
    <button class="btn-toggle on" id="btn-toggle" onclick="toggleBot()">Bot ON</button>
  </div>
</div>

<div class="content">
  <div class="banner on" id="banner">
    <div class="dot on" id="banner-dot"></div>
    <span id="banner-text">Bot actif</span>
  </div>

  <div class="schedule-info" id="schedule-info">
    ⏰ Horaire auto : Bot ON de 20h00 à 22h00 (heure française) — Tu peux forcer ON/OFF manuellement
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-lbl">VAs connectés</div><div class="stat-val green" id="cnt-connected">0</div></div>
    <div class="stat"><div class="stat-lbl">Numéros actifs</div><div class="stat-val amber" id="cnt-numbers">0</div></div>
    <div class="stat"><div class="stat-lbl">Solde</div><div class="stat-val" id="cnt-balance">—</div></div>
  </div>

  <div class="section-title">VAs connectés</div>
  <div class="va-list" id="va-list">
    <div class="empty-state">Aucun VA connecté</div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let isOverride = false;

socket.emit('login', { role: 'admin', password: prompt('Mot de passe admin :') || '' });

socket.on('login_ok', () => refreshBalance());
socket.on('login_error', () => { alert('Mot de passe incorrect'); location.href = '/'; });

socket.on('admin_state', ({ botEnabled, adminOverride, vas, total }) => {
  isOverride = adminOverride !== null;
  updateBotUI(botEnabled, isOverride);
  renderVAs(vas);
  document.getElementById('cnt-connected').textContent = total;
  document.getElementById('cnt-numbers').textContent = vas.filter(v => v.hasNumber).length;
});

socket.on('bot_state', ({ enabled }) => updateBotUI(enabled, isOverride));

function toggleBot() { socket.emit('toggle_bot'); isOverride = true; }
function resetSchedule() { socket.emit('reset_schedule'); isOverride = false; }

function updateBotUI(enabled, override) {
  const btn = document.getElementById('btn-toggle');
  const banner = document.getElementById('banner');
  const dot = document.getElementById('banner-dot');
  const text = document.getElementById('banner-text');
  const autoBtn = document.getElementById('btn-auto');
  const scheduleInfo = document.getElementById('schedule-info');

  btn.textContent = enabled ? 'Bot ON' : 'Bot OFF';
  btn.className = 'btn-toggle ' + (enabled ? 'on' : 'off');

  if (override) {
    autoBtn.style.display = 'inline-block';
    scheduleInfo.textContent = '⚠️ Mode manuel actif — clique "↺ Mode auto" pour revenir à l\'horaire 20h-22h';
    banner.className = 'banner ' + (enabled ? 'on' : 'off');
    dot.className = 'dot ' + (enabled ? 'on' : 'off');
    text.textContent = enabled ? 'Bot forcé ON par admin' : 'Bot forcé OFF par admin';
  } else {
    autoBtn.style.display = 'none';
    scheduleInfo.textContent = '⏰ Horaire auto : Bot ON de 20h00 à 22h00 (heure française)';
    banner.className = 'banner ' + (enabled ? 'on' : 'auto');
    dot.className = 'dot ' + (enabled ? 'on' : 'auto');
    text.textContent = enabled ? 'Bot actif automatiquement (20h-22h)' : 'Bot inactif — s\'active à 20h00 automatiquement';
  }
}

function renderVAs(vas) {
  const list = document.getElementById('va-list');
  if (!vas.length) { list.innerHTML = '<div class="empty-state">Aucun VA connecté</div>'; return; }
  list.innerHTML = vas.map((va, i) => {
    const joined = new Date(va.joinedAt).toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
    return `
      <div class="va-row ${va.hasNumber ? 'has-number' : ''}">
        <div class="va-avatar">VA${i+1}</div>
        <div class="va-info">
          <div class="va-id">${va.id.slice(0,8)}...</div>
          ${va.hasNumber ? `<div class="va-number">+${va.number}</div>` : ''}
          <div class="va-time">Connecté à ${joined}</div>
        </div>
        <div class="va-badge ${va.hasNumber ? 'active' : 'idle'}">${va.hasNumber ? 'Numéro actif' : 'Libre'}</div>
        <button class="btn-kick" onclick="kick('${va.id}')">Kick</button>
      </div>`;
  }).join('');
}

function kick(id) {
  if (confirm('Déconnecter ce VA ?')) socket.emit('kick_va', id);
}

async function refreshBalance() {
  try {
    const r = await fetch('/api/balance').then(r => r.json());
    if (r.balance) {
      const val = '$' + parseFloat(r.balance).toFixed(4);
      document.getElementById('lbl-balance').textContent = val;
      document.getElementById('cnt-balance').textContent = val;
    }
  } catch(e) {}
}
</script>
</body>
</html>
